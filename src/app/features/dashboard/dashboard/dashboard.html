<div class="min-h-screen bg-gray-50 flex">
  <!-- Mobile Backdrop Overlay -->
  @if (isSidebarOpen()) {
    <div 
      class="fixed inset-0 bg-slate-900/50 z-30 md:hidden backdrop-blur-sm"
      (click)="toggleSidebar()">
    </div>
  }

  <!-- Fixed Sidebar -->
  <aside 
    [class.translate-x-0]="isSidebarOpen()"
    class="fixed inset-y-0 left-0 z-40 w-64 bg-white text-slate-600 flex flex-col border-r border-slate-200 shadow-sm transition-transform duration-300 ease-in-out transform -translate-x-full md:translate-x-0">
    
    <!-- Brand Logo -->
    <div class="h-20 flex items-center px-8 mb-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
        </div>
        <span class="text-slate-900 text-xl font-bold tracking-tight">ShopNow</span>
      </div>
    </div>
    
    <!-- Navigation Links -->
    <nav class="flex-1 px-4 space-y-2">
      <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Main Menu</p>
      
      <a 
        routerLink="./"
        routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 transition-all font-semibold group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70 group-hover:text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
        </svg>
        Products
      </a>

      <a 
        routerLink="profile" 
        routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 transition-all font-semibold group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70 group-hover:text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Profile
      </a>

      <a 
        routerLink="accounts" 
        routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 transition-all font-semibold group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70 group-hover:text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
        </svg>
        Accounts
      </a>

      <a 
        routerLink="orders" 
        routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 transition-all font-semibold group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70 group-hover:text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
        </svg>
        Orders
      </a>

      <a 
        routerLink="cart" 
        routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
        class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-50 transition-all font-semibold group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70 group-hover:text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        Cart
      </a>
    </nav>

    <!-- Bottom User Section -->
    <div class="p-4 border-t border-slate-100 bg-slate-50/50">
      <div class="flex items-center gap-3 px-2 py-3 mb-2">
        <div class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold border border-blue-200">
          {{ (currentUser?.name?.substring(0, 1) || 'U') }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold text-slate-900 truncate">{{ currentUser?.name || 'User' }}</p>
          <p class="text-xs text-slate-500 truncate">{{ currentUser?.email }}</p>
        </div>
      </div>
      <a href="#" class="flex items-center gap-3 px-4 py-2 rounded-lg text-red-500 hover:bg-red-50 transition-all font-semibold group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70 group-hover:text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- Main Wrapper (shifted by sidebar width) -->
  <div class="flex-1 flex flex-col md:ml-64 min-w-0">
    <!-- Header -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-20">
      <div class="flex items-center gap-4">
        <!-- Mobile Menu Toggle Button (visible only on small screens) -->
        <button 
          (click)="toggleSidebar()"
          class="p-2 -ml-2 text-gray-600 md:hidden hover:bg-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h2 class="text-lg font-semibold text-gray-700 truncate">Dashboard Overview</h2>
      </div>


      <div class="flex items-center space-x-4">
        <div class="h-9 w-9 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 border border-slate-300 font-bold text-xs">JD</div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="p-4">
      <router-outlet />
    </main>
  </div>
</div>
