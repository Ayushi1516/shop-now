<div class="max-w-5xl mx-auto py-10 px-4">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Order History</h1>
      <p class="text-slate-500 font-medium">Track your shipments and view past purchases.</p>
    </div>
    <div class="flex bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
      <button class="px-4 py-2 bg-blue-50 text-blue-600 rounded-lg text-sm font-bold">All Orders</button>
      <button class="px-4 py-2 text-slate-500 hover:text-slate-900 rounded-lg text-sm font-semibold transition-colors">Shipped</button>
      <button class="px-4 py-2 text-slate-500 hover:text-slate-900 rounded-lg text-sm font-semibold transition-colors">Pending</button>
    </div>
  </div>

  <div class="space-y-4">
    <!-- Order Card 1 -->
    <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm hover:border-blue-200 transition-all group">
      <div class="p-6 md:p-8 flex flex-col md:flex-row md:items-center gap-6">
        <!-- Order Visual Summary -->
        <div class="flex -space-x-4">
          <div class="w-16 h-16 rounded-2xl border-2 border-white bg-slate-100 overflow-hidden shadow-sm">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=100" class="w-full h-full object-cover" />
          </div>
          <div class="w-16 h-16 rounded-2xl border-2 border-white bg-slate-100 flex items-center justify-center text-slate-400 font-bold text-sm shadow-sm">
            +2
          </div>
        </div>

        <!-- Order Info -->
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-sm font-bold text-slate-900">Order #SHP-82910</span>
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-700 border border-emerald-200 uppercase tracking-wider">Delivered</span>
          </div>
          <p class="text-xs text-slate-500 font-medium">Placed on Oct 24, 2023 • 3 items</p>
        </div>

        <!-- Price & Action -->
        <div class="flex items-center justify-between md:flex-col md:items-end gap-2">
          <p class="text-xl font-extrabold text-slate-900">$459.97</p>
          <button class="text-blue-600 text-sm font-bold hover:underline">View Details</button>
        </div>
      </div>
    </div>

    <!-- Order Card 2 -->
    <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm hover:border-blue-200 transition-all group">
      <div class="p-6 md:p-8 flex flex-col md:flex-row md:items-center gap-6">
        <div class="w-16 h-16 rounded-2xl border-2 border-white bg-slate-100 overflow-hidden shadow-sm">
          <img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?q=80&w=100" class="w-full h-full object-cover" />
        </div>
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-sm font-bold text-slate-900">Order #SHP-82911</span>
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-blue-100 text-blue-700 border border-blue-200 uppercase tracking-wider">Processing</span>
          </div>
          <p class="text-xs text-slate-500 font-medium">Placed on Oct 26, 2023 • 1 item</p>
        </div>
        <div class="flex items-center justify-between md:flex-col md:items-end gap-2">
          <p class="text-xl font-extrabold text-slate-900">$199.99</p>
          <button class="text-blue-600 text-sm font-bold hover:underline">Track Order</button>
        </div>
      </div>
    </div>
  </div>
</div>
