<div class="p-6 max-w-4xl mx-auto">
  <h1 class="text-2xl font-extrabold text-slate-900 mb-8">Shopping Cart</h1>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
    <!-- Cart Items List -->
    <div class="lg:col-span-2 space-y-6">
      <!-- Individual Cart Item Card -->
      <div class="flex gap-6 p-4 rounded-3xl bg-white border border-slate-200 hover:shadow-sm transition-all group">
        <div class="w-24 h-24 md:w-32 md:h-32 rounded-2xl bg-slate-100 overflow-hidden border border-slate-100">
          <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=300" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
        </div>
        
        <div class="flex-1 flex flex-col justify-between py-1">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="font-bold text-slate-900 md:text-lg">Wireless Headphones</h3>
              <p class="text-xs text-slate-500 font-medium mt-1">Electronics • Space Gray</p>
            </div>
            <button class="text-slate-400 hover:text-rose-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>

          <div class="flex justify-between items-end mt-4">
            <!-- Quantity Toggle Interface -->
            <div class="flex items-center bg-slate-100 rounded-xl p-1">
              <button class="w-8 h-8 flex items-center justify-center text-slate-600 hover:bg-white rounded-lg transition-colors font-bold">-</button>
              <span class="px-4 text-sm font-extrabold text-slate-900">1</span>
              <button class="w-8 h-8 flex items-center justify-center text-slate-600 hover:bg-white rounded-lg transition-colors font-bold">+</button>
            </div>
            <p class="text-lg font-extrabold text-slate-900">$299.99</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Summary Sidebar Design -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-3xl border border-slate-200 p-8 sticky top-24 shadow-sm">
        <h3 class="text-lg font-bold text-slate-900 mb-6">Order Summary</h3>
        <div class="space-y-4 mb-6">
          <div class="flex justify-between text-sm">
            <span class="text-slate-500 font-medium">Subtotal</span>
            <span class="text-slate-900 font-bold">$299.99</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-slate-500 font-medium">Shipping</span>
            <span class="text-emerald-600 font-bold">Free</span>
          </div>
        </div>
        <div class="border-t border-slate-100 pt-4 flex justify-between items-center mb-8">
          <span class="font-bold text-slate-900">Total</span>
          <span class="text-2xl font-extrabold text-blue-600">$299.99</span>
        </div>
        <button class="w-full py-4 bg-blue-600 text-white rounded-2xl font-extrabold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">
          Checkout
        </button>
      </div>
    </div>
  </div>
</div>
