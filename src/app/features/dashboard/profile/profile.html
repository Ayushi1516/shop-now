<div class="max-w-4xl mx-auto py-10 px-4">
  <div class="bg-white shadow-sm rounded-3xl border border-slate-200 overflow-hidden">
    <!-- Cover Image / Gradient Backdrop -->
    <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-500"></div>
    
    <div class="px-8 pb-8">
      <!-- Profile Header Section -->
      <div class="relative flex justify-between items-end -mt-12 mb-6">
        <div class="h-24 w-24 rounded-3xl bg-white p-2 shadow-lg">
          <div class="h-full w-full rounded-2xl bg-blue-50 flex items-center justify-center text-3xl font-extrabold text-blue-600 border border-blue-100">
            {{ (currentUser?.name?.substring(0, 1) || 'U') }}
          </div>
        </div>
        <button class="px-6 py-2.5 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200">
          Edit Profile
        </button>
      </div>

      <div class="space-y-8">
        <!-- User Name and Email -->
        <div>
          <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">{{ currentUser?.name }}</h1>
          <p class="text-slate-500 font-medium">{{ currentUser?.email }}</p>
        </div>

        <!-- Details Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Account Role Card -->
          <div class="p-6 rounded-2xl bg-slate-50 border border-slate-100 flex flex-col gap-1">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Account Type</span>
            <div class="mt-2">
              <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700 border border-blue-200">
                {{ currentUser?.role || 'MEMBER' }}
              </span>
            </div>
          </div>

          <!-- Account ID Card -->
          <div class="p-6 rounded-2xl bg-slate-50 border border-slate-100 flex flex-col gap-1">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Internal ID</span>
            <p class="mt-2 text-slate-900 font-mono text-sm font-medium">{{ currentUser?.id }}</p>
          </div>
        </div>

        <!-- Security Section -->
        <div class="pt-6 border-t border-slate-100">
          <h3 class="text-lg font-bold text-slate-900 mb-4">Account Security</h3>
          <div class="flex items-center justify-between p-5 rounded-2xl border border-slate-200 hover:border-blue-200 transition-colors cursor-pointer group">
            <div class="flex items-center gap-4">
              <div class="p-3 bg-slate-100 rounded-xl text-slate-500 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </div>
              <div>
                <p class="text-sm font-bold text-slate-900">Password</p>
                <p class="text-xs text-slate-500 font-medium">Secure your account with a unique password</p>
              </div>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-300 group-hover:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Help Section -->
  <div class="mt-8 text-center">
    <p class="text-sm text-slate-400">Need help? <a href="#" class="text-blue-600 font-bold hover:underline">Contact ShopNow Support</a></p>
  </div>
</div>
